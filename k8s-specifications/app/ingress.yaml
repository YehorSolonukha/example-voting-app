apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: subdomain-voting-ingress
  annotations:
    # Tells AKS to link this configuration to its built-in NGINX engine
    kubernetes.io/ingress.class: webapprouting
    kubernetes.io/proxy-read-timeout: "3600"
    kubernetes.io/proxy-send-timeout: "3600"
    kubernetes.io/websocket-services: "result-service"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  # Rule 1: Watch for the voting subdomain host header
  - host: vote.74.248.82.97.nip.io # <--- Replace with your actual AKS public IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote # Points to your internal voting ClusterIP service
            port:
              number: 80

  # Rule 2: Watch for the results subdomain host header
  - host: result.74.248.82.97.nip.io # <--- Replace with your actual AKS public IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: result # Points to your internal result ClusterIP service
            port:
              number: 80
      
apiVersion: v1
kind: Service
metadata:
  name: voting-app-service
spec:
  type: LoadBalancer # Wymusza na Azure przydzielenie zewnętrznego adresu IP (Faza 2)
  selector:
    app: voting-app # Kieruje ruch do Podów oznaczonych etykietą 'app: voting-app'
  ports:
  - protocol: TCP
    port: 80       # Port publiczny, na który wchodzisz w przeglądarce
    targetPort: 80 # Port wewnątrz kontenera, na który trafia ruch